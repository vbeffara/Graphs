name: Compile blueprint

on:
  push:
    branches:
      - main # Trigger on pushes to the default branch
  workflow_dispatch:        # Allow manual triggering of the workflow from the GitHub Actions interface

# Cancel previous runs if a new commit is pushed to the same PR or branch
concurrency:
  group: ${{ github.ref }}  # Group runs by the ref (branch or PR)
  cancel-in-progress: true  # Cancel any ongoing runs in the same group

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read          # Read access to repository contents
  pages: write            # Write access to GitHub Pages
  id-token: write         # Write access to ID tokens
  issues: write           # Write access to issues
  pull-requests: write    # Write access to pull requests

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project
    steps:
      - name: Checkout project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Build and lint project
        uses: leanprover/lean-action@434f25c2f80ded67bba02502ad3a86f25db50709 # 2025-07-02
        with:
          build: true
          lint: false
          mk_all-check: true
          use-github-cache: false
          build-args: :blueprint

      - name: Build blueprint web
        run: |
          sudo apt install -y graphviz libgraphviz-dev
          pip install uv
          uv sync
          . .venv/bin/activate
          lake build :blueprint
          MODPATH="$(pwd)/.lake/build/blueprint/module"
          # Remove any existing generated files (including dangling symlinks from earlier attempts)
          rm -f blueprint/src/Graphs.tex
          rm -rf blueprint/src/lean-modules
          # Copy the library index file, rewriting absolute module paths to relative ones
          sed "s|${MODPATH}/|lean-modules/|g" \
            .lake/build/blueprint/library/Graphs.tex > blueprint/src/Graphs.tex
          # Copy all generated module tex files into blueprint/src/lean-modules/
          cp -r .lake/build/blueprint/module/. blueprint/src/lean-modules/
          # Fix absolute artifact paths inside module files to be relative to their own directory.
          # Root-level modules (e.g. lean-modules/Graphs.tex) reference Graphs.artifacts/…
          find blueprint/src/lean-modules -maxdepth 1 -name "*.tex" \
            -exec sed -i "s|${MODPATH}/||g" {} \;
          # Sub-modules (e.g. lean-modules/Graphs/Menger.tex) reference Menger.artifacts/…
          find blueprint/src/lean-modules -mindepth 2 -name "*.tex" \
            -exec sed -i "s|${MODPATH}/Graphs/||g" {} \;
          leanblueprint web
          cp -r blueprint/web home_page/blueprint

      - name: Compile blueprint and documentation
        uses: leanprover-community/docgen-action@deed0cdc44dd8e5de07a300773eb751d33e32fc8 # 2025-10-26
        with:
          blueprint: false
          homepage: home_page