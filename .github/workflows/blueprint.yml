name: Compile blueprint

on:
  push:
    branches:
      - main # Trigger on pushes to the default branch
  pull_request:             # Trigger on pull requests (build only, no deployment)
  workflow_dispatch:        # Allow manual triggering of the workflow from the GitHub Actions interface

# Cancel previous runs if a new commit is pushed to the same PR or branch
concurrency:
  group: ${{ github.ref }}  # Group runs by the ref (branch or PR)
  cancel-in-progress: true  # Cancel any ongoing runs in the same group

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read          # Read access to repository contents
  pages: write            # Write access to GitHub Pages
  id-token: write         # Write access to ID tokens
  issues: write           # Write access to issues
  pull-requests: write    # Write access to pull requests

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project
    steps:
      - name: Checkout project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Build and lint project
        uses: leanprover/lean-action@434f25c2f80ded67bba02502ad3a86f25db50709 # 2025-07-02
        with:
          build: true
          lint: false
          mk_all-check: true
          use-github-cache: false
          build-args: :blueprint

      - name: Build blueprint web
        run: |
          sudo apt install -y graphviz libgraphviz-dev
          pip install uv
          uv sync
          . .venv/bin/activate
          # Stage LeanArchitect-generated files into blueprint/src/ so that
          # plasTeX (which runs from blueprint/src/) can find them.
          # We extract the absolute module path prefix directly from the
          # library index file to avoid any realpath/symlink mismatch.
          python3 << 'PYEOF'
          import os, re, shutil, sys

          libfile = '.lake/build/blueprint/library/Graphs.tex'
          src = 'blueprint/src'

          if not os.path.exists(libfile):
              print(f'ERROR: {libfile} not found', file=sys.stderr)
              sys.exit(1)

          with open(libfile) as f:
              lib = f.read()

          inputs = re.findall(r'\\input\{([^}]+)\}', lib)
          if not inputs:
              print('ERROR: no \\input found in library file', file=sys.stderr)
              sys.exit(1)

          def find_modpath(path):
              parts = path.replace('\\', '/').split('/')
              for i, part in enumerate(parts):
                  if part == 'module':
                      return '/'.join(parts[:i + 1])
              return None

          modpath = find_modpath(inputs[0])
          if not modpath:
              print(f'ERROR: no "module" component in: {inputs[0]}', file=sys.stderr)
              sys.exit(1)
          print(f'Module path: {modpath}')

          if not os.path.isdir(modpath):
              print(f'ERROR: module dir not found: {modpath}', file=sys.stderr)
              sys.exit(1)

          os.makedirs(src, exist_ok=True)
          with open(os.path.join(src, 'Graphs.tex'), 'w') as f:
              f.write(lib.replace(modpath + '/', 'lean-modules/'))

          dest = os.path.join(src, 'lean-modules')
          if os.path.exists(dest):
              shutil.rmtree(dest)
          shutil.copytree(modpath, dest)

          count = 0
          for root, dirs, files in os.walk(dest):
              for fn in files:
                  if fn.endswith('.tex'):
                      fp = os.path.join(root, fn)
                      with open(fp) as f:
                          c = f.read()
                      nc = c.replace(modpath + '/', 'lean-modules/')
                      if nc != c:
                          with open(fp, 'w') as f:
                              f.write(nc)
                          count += 1
          print(f'Staged {len(inputs)} modules, {count} files updated')
          PYEOF
          leanblueprint web
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            cp -r blueprint/web home_page/blueprint
          fi

      - name: Compile blueprint and documentation
        if: github.event_name != 'pull_request'
        uses: leanprover-community/docgen-action@deed0cdc44dd8e5de07a300773eb751d33e32fc8 # 2025-10-26
        with:
          blueprint: false
          homepage: home_page