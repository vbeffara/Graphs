name = "Graphs"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Graphs"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "main"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "95dde257a2a4d47c656d10aa8e4a05947754a7f0"

[[lean_lib]]
name = "Graphs"
